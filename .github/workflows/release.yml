name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    name: Build macOS App
    runs-on: macos-14  # Apple Silicon runner
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2

      - name: Build
        run: bash scripts/build.sh --dmg

      - name: Run tests
        run: cargo test

      - name: Upload app bundle
        uses: actions/upload-artifact@v4
        with:
          name: DevSpace.app
          path: build/DevSpace.app

      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: DevSpace.dmg
          path: build/DevSpace.dmg

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: build/DevSpace.dmg
          generate_release_notes: true
